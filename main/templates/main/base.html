<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FoodMart{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      .shop-wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 64px 32px 96px;
        font-family: 'Inter', sans-serif;
        color: #1A1A1A;
      }

      .shop-header {
        margin-bottom: 56px;
      }

      .shop-eyebrow {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #2D6A4F;
        margin: 0 0 10px;
      }

      .shop-title {
        font-family: 'Fraunces', serif;
        font-weight: 600;
        font-size: 42px;
        line-height: 1.1;
        margin: 0;
        letter-spacing: -0.01em;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1px;
        background-color: #E8E6E0;
        border: 1px solid #E8E6E0;
        border-radius: 14px;
        overflow: hidden;
      }

      .product-card {
        background-color: #FAFAF8;
        padding: 32px 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 220px;
        transition: background-color 0.2s ease;
      }

      .product-card:hover {
        background-color: #FFFFFF;
      }

      .product-name {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 21px;
        margin: 0 0 18px;
        color: #1A1A1A;
        text-transform: capitalize;
      }

      .product-price {
        font-size: 15px;
        color: #6B6B6B;
        margin: 0 0 24px;
        font-weight: 500;
        letter-spacing: 0.01em;
      }

      .product-price .currency {
        font-size: 13px;
        color: #9A9A9A;
        margin-left: 2px;
      }

      .buy-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #2D6A4F;
        text-decoration: none;
        border-bottom: 1.5px solid transparent;
        padding-bottom: 2px;
        width: fit-content;
        transition: border-color 0.15s ease, gap 0.15s ease;
      }

      .buy-link:hover {
        border-bottom-color: #2D6A4F;
        gap: 9px;
      }

      .buy-link::after {
        content: "→";
        font-size: 14px;
        transition: transform 0.15s ease;
      }

      .empty-state {
        font-size: 15px;
        color: #6B6B6B;
        padding: 32px 0;
      }

      @media (max-width: 640px) {
        .shop-wrap { padding: 40px 18px 64px; }
        .shop-title { font-size: 32px; }
        .product-grid { grid-template-columns: 1fr 1fr; }
        .product-card { padding: 24px 20px; min-height: 180px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .product-card, .buy-link, .buy-link::after { transition: none; }
      }
    </style>
</head>
<body>

{% block content %}
<div class="shop-wrap">
  <header class="shop-header">
    <p class="shop-eyebrow">Katalog</p>
    <h1 class="shop-title">Ayollar bo'limi mahsulotlari</h1>
  </header>

  <div class="product-grid">
    {% for product in products %}
    <div class="product-card">
      <div>
        <h2 class="product-name">{{ product.name }}</h2>
        <p class="product-price">{{ product.price }}<span class="currency"> so'm</span></p>
      </div>
      <a href="{% url 'add_to_cart' product.pk %}" class="buy-link">Sotib olish</a>
    </div>
    {% empty %}
    <p class="empty-state">Hozircha mahsulotlar yo'q.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}

</body>
</html>
