{% block content %}

    {% if products %}
        <ul>
            {% for product in products %}
                <li>{{ product.name }} - {{ product.price }} so‘m</li>
            {% endfor %}
        </ul>

        <p>Ma’lumot yo‘q</p>
    {% endif %}
{% endblock %}
