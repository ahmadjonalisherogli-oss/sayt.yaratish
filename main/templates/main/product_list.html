{% extends 'main/base.html' %}

{% block content %}
<h2>Bizning Mahsulotlar</h2>

{% for product in products %}
  <div>
    <h4>{{ product.name }}</h4>
    <p>{{ product.price }} so'm</p>
    <button>Sotib olish</button>
  </div>
  <br> 
{% empty %}
  <p>Hozircha mahsulotlar mavjud emas.</p>
{% endfor %}
{% endblock %}
